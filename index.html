<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="description" content="ムシ算は、むしをあつめながら算数を学べる小学生向けのブラウザゲームです。インストール不要、登録不要、広告なしです。"/>
<meta name="theme-color" content="#090f0a"/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="ムシ算"/>
<meta property="og:description" content="むしをあつめながら、さんすうをまなぼう。ブラウザですぐ遊べる算数ゲーム。"/>
<title>ムシ算｜むしをあつめながら さんすうをまなぼう！</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="insects.js"></script>
<script src="bug_meta.js"></script>
<script src="icons.js"></script>

<script type="text/babel" src="hero.jsx"></script>
<script type="text/babel" src="features.jsx"></script>
<script type="text/babel" src="audience.jsx"></script>
<script type="text/babel" src="mid.jsx"></script>
<script type="text/babel" src="bottom.jsx"></script>
<script type="text/babel" src="tweaks.jsx"></script>

<script type="text/babel">
// Create context first so components can use it
window.ModeContext = React.createContext({ mode: 'kid', setMode: () => {} });

const App = () => {
  const [tweaks, setTweaks] = React.useState(window.TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [mode, setMode] = React.useState('kid');

  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (k, v) => {
    setTweaks(t => {
      const next = { ...t, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      return next;
    });
  };

  return (
    <window.ModeContext.Provider value={{ mode, setMode }}>
      <window.Nav />
      <window.Hero />
      <window.GameFlow />
      <window.Features />
      <window.Rarity />
      <window.LevelSystem />
      <window.Dex />
      <window.ParentSection />
      <window.FAQ />
      <window.FinalCTA />
      <window.Footer />
      <window.TweaksPanel visible={tweaksVisible} tweaks={tweaks} setTweak={setTweak} />
    </window.ModeContext.Provider>
  );
};

const tryRender = () => {
  if (window.Nav && window.Hero && window.GameFlow && window.Features && window.Rarity &&
      window.LevelSystem && window.Dex && window.ParentSection && window.FAQ &&
      window.FinalCTA && window.Footer && window.TweaksPanel) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  } else {
    setTimeout(tryRender, 50);
  }
};
tryRender();
</script>
</body>
</html>
